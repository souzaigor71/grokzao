<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrokZão - Telemetria Alienígena</title>
<style>
  :root {
    --accent: #00ff66;
    --bg-dark: #020204;
    --radar-green: #00ff55;
    --glow-neutro: #00ff66;
    --glow-feliz: #00ffcc;
    --glow-sarcastico: #8a2be2;
    --glow-surpreso: #00ffff;
    --glow-bravo: #ff003c;
  }
  
  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Courier New', Courier, monospace;
    background-color: var(--bg-dark);
    background-image: 
      radial-gradient(circle at 50% 30%, #0c1a10 0%, transparent 70%),
      linear-gradient(rgba(0, 255, 85, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 85, 0.03) 1px, transparent 1px);
    background-size: 100% 100%, 20px 20px, 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #a3ffd0;
    padding: 20px;
    overflow-x: hidden;
  }

  h1 {
    margin: 5px 0 15px;
    font-size: 1.4rem;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 10px var(--radar-green);
    font-weight: bold;
    text-align: center;
  }

  /* --- CRÂNIO DO ALIENÍGENA --- */
  .avatar-box {
    position: relative;
    width: 240px;
    height: 270px;
    background: #000000;
    border-radius: 70% 70% 60% 60% / 50% 50% 90% 90%;
    border: 2px solid rgba(0, 255, 85, 0.4);
    box-shadow: 
      0 0 35px rgba(0, 255, 85, 0.15), 
      inset 0 0 30px rgba(0, 255, 85, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 25px;
    transition: box-shadow 0.4s ease, border-color 0.4s ease;
  }
  
  .rosto {
    position: relative;
    width: 100%;
    height: 100%;
  }
  
  /* --- OLHOS OVALADOS --- */
  .olho {
    position: absolute;
    top: 90px;
    width: 65px;
    height: 90px;
    background: #060608;
    border-radius: 85% 20% 60% 55% / 60% 20% 85% 55%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    border: 1px solid rgba(0, 255, 85, 0.2);
    box-shadow: inset 0 0 20px #000;
  }
  
  .olho.esq { left: 35px; transform: rotate(26deg); }
  .olho.dir { right: 35px; transform: rotate(-26deg); }
  
  .pupila {
    width: 8px;
    height: 14px;
    background: var(--radar-green);
    border-radius: 50%;
    box-shadow: 0 0 15px var(--radar-green), 0 0 5px #fff;
    transition: all 0.3s ease;
    animation: pulsarGlow 2.5s infinite ease-in-out;
  }

  .sobrancelha {
    position: absolute;
    top: 72px;
    width: 55px;
    height: 3px;
    background: rgba(0, 255, 85, 0.3);
    border-radius: 2px;
    transition: all 0.3s ease;
  }
  .sobrancelha.esq { left: 35px; transform: rotate(14deg); }
  .sobrancelha.dir { right: 35px; transform: rotate(-14deg); }

  .boca {
    position: absolute;
    bottom: 45px;
    left: 50%;
    transform: translateX(-50%);
    width: 25px;
    height: 2px;
    background: var(--radar-green);
    border-radius: 1px;
    box-shadow: 0 0 10px var(--radar-green);
    transition: all 0.1s ease;
  }

  /* --- ANIMAÇÕES DE EXPRESSÃO --- */
  .avatar-box.feliz { box-shadow: 0 0 45px var(--glow-feliz); border-color: var(--glow-feliz); }
  .avatar-box.feliz .olho { height: 75px; }
  .avatar-box.feliz .boca { height: 10px; width: 30px; border-radius: 0 0 50% 50%; }

  .avatar-box.sarcastico { box-shadow: 0 0 45px var(--glow-sarcastico); border-color: var(--glow-sarcastico); }
  .avatar-box.sarcastico .sobrancelha.esq { transform: rotate(-10deg) translateY(-4px); }
  .avatar-box.sarcastico .boca { width: 22px; height: 3px; transform: translateX(-50%) rotate(10deg); }

  .avatar-box.surpreso { box-shadow: 0 0 45px var(--glow-surpreso); border-color: var(--glow-surpreso); }
  .avatar-box.surpreso .pupila { transform: scale(2); }
  .avatar-box.surpreso .boca { width: 14px; height: 14px; border-radius: 50%; }

  .avatar-box.bravo { box-shadow: 0 0 45px var(--glow-bravo); border-color: var(--glow-bravo); }
  .avatar-box.bravo .sobrancelha.esq { transform: rotate(28deg) translateY(7px); }
  .avatar-box.bravo .sobrancelha.dir { transform: rotate(-28deg) translateY(7px); }
  .avatar-box.bravo .pupila { background: #ff003c; box-shadow: 0 0 15px #ff003c; }
  .avatar-box.bravo .boca { width: 40px; height: 3px; }

  /* --- TERMINAL DE CHAT --- */
  .chat-panel {
    width: 100%;
    max-width: 550px;
    background: rgba(0, 5, 2, 0.9);
    border-radius: 8px;
    border: 1px solid rgba(0, 255, 85, 0.3);
    display: flex;
    flex-direction: column;
    height: 360px;
    box-shadow: 0 0 35px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(0, 255, 85, 0.05);
  }
  
  .chat-log {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 0.85rem;
    line-height: 1.4;
    word-wrap: break-word;
    animation: fadeIn 0.2s ease forwards;
  }
  
  .msg.user {
    background: rgba(0, 255, 85, 0.08);
    color: #fff;
    align-self: flex-end;
    border: 1px solid var(--radar-green);
    text-shadow: 0 0 4px rgba(0, 255, 85, 0.5);
  }
  
  .msg.bot {
    background: rgba(10, 12, 10, 0.9);
    color: #a3ffd0;
    align-self: flex-start;
    border: 1px solid rgba(0, 255, 85, 0.12);
  }
  
  .controls {
    display: flex;
    padding: 10px;
    background: rgba(0, 0, 0, 0.8);
    border-top: 1px solid rgba(0, 255, 85, 0.2);
    gap: 8px;
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
  }
  
  input {
    flex: 1;
    background: #020503;
    border: 1px solid rgba(0, 255, 85, 0.4);
    border-radius: 4px;
    padding: 10px 14px;
    color: #fff;
    font-size: 0.88rem;
    outline: none;
    font-family: inherit;
  }
  input:focus { border-color: var(--radar-green); box-shadow: 0 0 8px rgba(0, 255, 85, 0.2); }
  
  button {
    background: #031408;
    border: 1px solid var(--radar-green);
    color: var(--radar-green);
    padding: 0 16px;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  button:hover { background: var(--radar-green); color: #000; box-shadow: 0 0 10px var(--radar-green); }
  button:disabled { background: #020603; border-color: #222; color: #444; cursor: not-allowed; }

  .mic-btn {
    background: #020503;
    border: 1px solid rgba(0, 255, 85, 0.4);
    padding: 0 14px;
    font-size: 1.05rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mic-btn.gravando {
    background: #ff003c;
    border-color: #ff003c;
    color: #fff;
    animation: interceptar 1s infinite ease-in-out;
    box-shadow: 0 0 15px #ff003c;
  }

  .status-bar {
    width: 100%;
    max-width: 550px;
    padding: 8px;
    font-size: 0.78rem;
    color: #4b8f67;
    text-align: center;
    min-height: 28px;
    letter-spacing: 1px;
  }

  @keyframes fadeIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
  @keyframes pulsarGlow { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
  @keyframes interceptar { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style> 
</head>
<body>

  <h1>SINAL DE QUANTUM DETECTADO: GROKZÃO</h1>

  <div class="avatar-box" id="avatarBox">
    <div class="rosto">
      <div class="sobrancelha esq"></div>
      <div class="sobrancelha dir"></div>
      <div class="olho esq"><div class="pupila"></div></div>
      <div class="olho dir"><div class="pupila"></div></div>
      <div class="boca" id="boca"></div>
    </div>
  </div>

  <div class="chat-panel">
    <div class="chat-log" id="chatLog"></div>
    <div class="controls">
      <input type="text" id="userInput" placeholder="Transmitir dados para o espaço..." autofocus>
      <button type="button" class="mic-btn" id="micBtn" title="Transmitir por voz">🎤</button>
      <button type="button" id="sendBtn">Enviar</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar"></div>

<script>
const avatarBox = document.getElementById('avatarBox');
const boca = document.getElementById('boca');
const log = document.getElementById('chatLog');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('statusBar');

const player = new Audio();
player.crossOrigin = "anonymous";

let audioCtx = null;
let analyser = null;
let source = null;
let dataArray = null;
let animacaoBocaId = null;

function iniciarPiscar(){
  setInterval(()=>{
    constGrid = document.querySelectorAll('.olho');
    constGrid.forEach(o => o.style.transform = o.classList.contains('esq') ? 'rotate(26deg) scaleY(0.02)' : 'rotate(-26deg) scaleY(0.02)');
    setTimeout(()=>{
      constGrid.forEach(o => o.style.transform = o.classList.contains('esq') ? 'rotate(26deg) scaleY(1)' : 'rotate(-26deg) scaleY(1)');
    }, 100);
  }, 3000 + Math.random() * 4000);
}
iniciarPiscar();

function setEmocao(emocao){
  avatarBox.className = 'avatar-box';
  if(['feliz','sarcastico','surpreso','bravo'].includes(emocao)){
    avatarBox.classList.add(emocao);
  }
}

function iniciarAudioGraph(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    source = audioCtx.createMediaElementSource(player);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
  }
  if(!animacaoBocaId) atualizarBoca();
}

function atualizarBoca(){
  animacaoBocaId = requestAnimationFrame(atualizarBoca);
  if(!analyser) return;
  
  analyser.getByteFrequencyData(dataArray);
  let soma = 0;
  for(let i=0; i<dataArray.length; i++){
    soma += dataArray[i];
  }
  let volume = soma / dataArray.length;

  let alturaBase = 2;
  let novaAltura = alturaBase + (volume * 0.22);
  boca.style.height = `${novaAltura}px`;
}

player.addEventListener('pause', () => { boca.style.height = ''; });
player.addEventListener('ended', () => { boca.style.height = ''; });

function addMsg(texto, quem){
  const div = document.createElement('div');
  div.className = `msg ${quem}`;
  div.textContent = texto;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function enviar(){
  const texto = input.value.trim();
  if (!texto) return; // Corrigido a validação que causava travamento
  
  input.value = '';
  addMsg(texto, 'user');
  sendBtn.disabled = true;
  statusEl.textContent = '>> Capturando frequências sub-espaciais...';

  try{
    const resp = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mensagem: texto})
    });
    const dados = await resp.json();

    if (dados.erro){
      addMsg('Erro: ' + dados.erro, 'bot');
      statusEl.textContent = '';
      sendBtn.disabled = false;
      return;
    }

    addMsg(dados.resposta, 'bot');
    setEmocao(dados.emocao);
    statusEl.textContent = '';

    if (dados.audio_url){
      iniciarAudioGraph();
      player.src = dados.audio_url + '?t=' + Date.now();
      await player.play();
    }
  }catch(e){
    addMsg('>> Falha na telemetria galáctica.', 'bot');
    statusEl.textContent = '';
  }finally{
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', enviar);
input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') enviar(); });

// --- RECONHECIMENTO DE VOZ ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = false;
  recognition.interimResults = false;

  micBtn.addEventListener('click', () => {
    if (micBtn.classList.contains('gravando')) {
      recognition.stop();
    } else {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      recognition.start();
    }
  });

  recognition.onstart = () => {
    micBtn.classList.add('gravando');
    statusEl.textContent = '>> Gravando ondas sonoras locais...';
  };

  recognition.onend = () => {
    micBtn.classList.remove('gravando');
    if (statusEl.textContent === '>> Gravando ondas sonoras locais...') statusEl.textContent = '';
  };

  recognition.onresult = (event) => {
    const textoFalado = event.results[0][0].transcript;
    input.value = textoFalado;
    enviar();
  };

  recognition.onerror = (event) => {
    console.error('Erro na gravação espacial:', event.error);
    statusEl.textContent = '>> Sinal de voz ruidoso. Repita a transmissão.';
    micBtn.classList.remove('gravando');
  };
} else {
  micBtn.style.display = 'none';
}

async function carregarHistorico(){
  try{
    const resp = await fetch('/historico');
    const dados = await resp.json();
    if(dados.mensagens){
      dados.mensagens.forEach(m => addMsg(m.texto, m.quem));
    }
  }catch(e){}
}
carregarHistorico();
</script>
</body>
</html>
