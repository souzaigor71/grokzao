<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrokZão</title>
<style>
  :root{
    --skin:#ffe0c7;
    --skin-shadow:#f5c9a8;
    --hair:#2b2b3a;
    --hair-light:#3e3e55;
    --accent:#7c5cff;
    --bg1:#0f0c29;
    --bg2:#302b63;
    --bg3:#24243e;
    --brow-color:#2b2b3a;
    --mouth-color:#c9425f;
    --panel:#161328cc;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    display:flex;
    flex-direction:column;
    align-items:center;
    color:#f0eefc;
    padding:20px;
  }
  h1{
    margin:6px 0 18px;
    font-size:1.6rem;
    letter-spacing:1px;
    color:#fff;
    text-shadow:0 0 12px var(--accent);
  }
  .stage{
    width:260px;
    height:300px;
    position:relative;
    filter:drop-shadow(0 10px 25px rgba(0,0,0,0.5));
  }
  .face-wrap{
    width:100%;
    height:100%;
    position:relative;
    transition:transform .25s ease;
  }
  .idle{
    animation:bob 3.4s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
  }
  .face{
    width:210px;
    height:230px;
    background:radial-gradient(circle at 35% 30%, var(--skin), var(--skin-shadow));
    border-radius:48% 48% 44% 44% / 52% 52% 40% 40%;
    position:absolute;
    left:25px;
    top:45px;
    box-shadow:inset 0 -14px 30px rgba(0,0,0,0.08);
  }
  .hair{
    position:absolute;
    left:8px;
    top:0px;
    width:244px;
    height:150px;
    background:linear-gradient(160deg,var(--hair-light),var(--hair));
    border-radius:50% 50% 30% 30% / 60% 60% 25% 25%;
    z-index:2;
  }
  .hair::before, .hair::after{
    content:'';
    position:absolute;
    top:70px;
    width:34px;
    height:110px;
    background:linear-gradient(160deg,var(--hair-light),var(--hair));
    border-radius:0 0 50% 50%;
  }
  .hair::before{ left:-6px; transform:rotate(8deg);}
  .hair::after{ right:-6px; transform:rotate(-8deg);}

  .cheek{
    position:absolute;
    width:26px;height:14px;
    background:#ff9fae;
    border-radius:50%;
    opacity:.55;
    top:168px;
    filter:blur(1px);
    z-index:3;
  }
  .cheek.l{left:52px;}
  .cheek.r{right:52px;}

  .eye{
    position:absolute;
    top:118px;
    width:34px;
    height:34px;
    background:#fff;
    border-radius:50%;
    box-shadow:0 2px 6px rgba(0,0,0,.15) inset;
    overflow:hidden;
    z-index:4;
    transition:transform .08s ease;
  }
  .eye.l{left:60px;}
  .eye.r{right:60px;}
  .pupil{
    position:absolute;
    width:18px;height:18px;
    background:radial-gradient(circle at 35% 30%, #6a4cff, #241a5c);
    border-radius:50%;
    top:8px;left:8px;
  }
  .pupil::after{
    content:'';
    position:absolute;
    width:6px;height:6px;
    background:#fff;
    border-radius:50%;
    top:2px;left:3px;
    opacity:.9;
  }
  .blink .eye{ transform:scaleY(0.06); }

  .brow{
    position:absolute;
    top:100px;
    width:34px;
    height:6px;
    background:var(--brow-color);
    border-radius:6px;
    z-index:5;
    transition:transform .2s ease, top .2s ease;
  }
  .brow.l{left:58px;}
  .brow.r{right:58px;}

  .mouth-holder{
    position:absolute;
    left:50%;
    top:186px;
    transform:translateX(-50%);
    width:60px;
    height:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:4;
  }
  .mouth{
    width:46px;
    height:6px;
    background:var(--mouth-color);
    border-radius:0 0 14px 14px;
    transition:height .06s linear, border-radius .15s ease, transform .2s ease, width .2s ease;
  }

  /* Expressões */
  .feliz .brow{ top:96px; transform:rotate(0deg); }
  .feliz .mouth{ border-radius:0 0 20px 20px; background:#c9425f; }

  .sarcastico .brow.l{ top:92px; transform:rotate(-14deg); }
  .sarcastico .brow.r{ top:104px; transform:rotate(6deg); }
  .sarcastico .mouth{ border-radius:0 14px 14px 0; transform:translateX(6px) rotate(-8deg); }

  .surpreso .brow{ top:88px; }
  .surpreso .eye{ transform:scale(1.15); }
  .surpreso .mouth{ border-radius:50%; width:24px; }

  .bravo .brow.l{ top:98px; transform:rotate(18deg); }
  .bravo .brow.r{ top:98px; transform:rotate(-18deg); }
  .bravo .mouth{ background:#a52c44; border-radius:14px 14px 0 0; transform:translateY(4px); }

  .panel{
    margin-top:18px;
    width:100%;
    max-width:520px;
    background:var(--panel);
    border-radius:16px;
    padding:14px;
    backdrop-filter:blur(6px);
    box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .log{
    max-height:220px;
    overflow-y:auto;
    padding:6px 4px;
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:10px;
  }
  .msg{
    padding:8px 12px;
    border-radius:12px;
    max-width:85%;
    font-size:.92rem;
    line-height:1.35;
  }
  .msg.user{
    align-self:flex-end;
    background:var(--accent);
    color:#fff;
    border-bottom-right-radius:2px;
  }
  .msg.bot{
    align-self:flex-start;
    background:#2c2850;
    color:#eee;
    border-bottom-left-radius:2px;
  }
  .row{
    display:flex;
    gap:8px;
  }
  input[type=text]{
    flex:1;
    padding:11px 14px;
    border-radius:10px;
    border:none;
    background:#231f3f;
    color:#fff;
    font-size:.95rem;
    outline:none;
  }
  input[type=text]::placeholder{ color:#9a93c9; }
  button{
    padding:11px 18px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:filter .15s ease;
  }
  button:hover{ filter:brightness(1.15); }
  button:disabled{ opacity:.5; cursor:not-allowed; }
  .status{
    font-size:.78rem;
    color:#b6aee6;
    min-height:16px;
    margin-top:6px;
    text-align:center;
  }
</style>
</head>
<body>

<h1>🤖 GrokZão</h1>

<div class="stage">
  <div class="face-wrap idle" id="faceWrap">
    <div class="hair"></div>
    <div class="face" id="face">
      <div class="brow l"></div>
      <div class="brow r"></div>
      <div class="eye l"><div class="pupil"></div></div>
      <div class="eye r"><div class="pupil"></div></div>
      <div class="cheek l"></div>
      <div class="cheek r"></div>
      <div class="mouth-holder"><div class="mouth" id="mouth"></div></div>
    </div>
  </div>
</div>

<div class="panel">
  <div class="log" id="log"></div>
  <div class="row">
    <input type="text" id="input" placeholder="Fala com o GrokZão..." autocomplete="off">
    <button id="sendBtn">Enviar</button>
  </div>
  <div class="status" id="status"></div>
</div>

<audio id="player" style="display:none"></audio>

<script>
const face = document.getElementById('face');
const mouth = document.getElementById('mouth');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const log = document.getElementById('log');
const statusEl = document.getElementById('status');
const player = document.getElementById('player');

// ---------- Piscar os olhos periodicamente ----------
function agendarPiscada(){
  const delay = 2000 + Math.random()*3500;
  setTimeout(()=>{
    face.classList.add('blink');
    setTimeout(()=>face.classList.remove('blink'), 140);
    agendarPiscada();
  }, delay);
}
agendarPiscada();

// ---------- Web Audio API para lip-sync em tempo real ----------
let audioCtx, analyser, sourceNode, dataArray, rafId;

function iniciarAudioGraph(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  sourceNode = audioCtx.createMediaElementSource(player);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function animarBoca(){
  analyser.getByteFrequencyData(dataArray);
  let soma = 0;
  for (let i=0;i<dataArray.length;i++) soma += dataArray[i];
  const media = soma / dataArray.length; // 0-255
  const altura = Math.min(30, 6 + media*0.5);
  mouth.style.height = altura + 'px';
  rafId = requestAnimationFrame(animarBoca);
}

player.addEventListener('play', ()=>{
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  animarBoca();
});
player.addEventListener('pause', pararAnimacaoBoca);
player.addEventListener('ended', pararAnimacaoBoca);

function pararAnimacaoBoca(){
  if (rafId) cancelAnimationFrame(rafId);
  mouth.style.height = '6px';
}

// ---------- Expressões ----------
function setEmocao(emocao){
  face.classList.remove('neutro','feliz','sarcastico','surpreso','bravo');
  face.classList.add(emocao || 'neutro');
}

// ---------- Chat ----------
function addMsg(texto, quem){
  const div = document.createElement('div');
  div.className = 'msg ' + quem;
  div.textContent = texto;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function enviar(){
  const texto = input.value.trim();
  if (!texto) return;
  input.value = '';
  addMsg(texto, 'user');
  sendBtn.disabled = true;
  statusEl.textContent = 'GrokZão está pensando...';

  try{
    const resp = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mensagem: texto})
    });
    const dados = await resp.json();

    if (dados.erro){
      addMsg('Erro: ' + dados.erro, 'bot');
      statusEl.textContent = '';
      sendBtn.disabled = false;
      return;
    }

    addMsg(dados.resposta, 'bot');
    setEmocao(dados.emocao);
    statusEl.textContent = '';

    if (dados.audio_url){
      iniciarAudioGraph();
      player.src = dados.audio_url + '?t=' + Date.now();
      await player.play();
    }
  }catch(e){
    addMsg('Erro de conexão com o servidor.', 'bot');
    statusEl.textContent = '';
  }finally{
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', enviar);
input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') enviar(); });

// ---------- Carregar histórico salvo ao abrir a página ----------
async function carregarHistorico(){
  try{
    const resp = await fetch('/historico');
    const dados = await resp.json();
    (dados.mensagens || []).forEach(m => addMsg(m.texto, m.quem));
  }catch(e){
    console.warn('Não foi possível carregar o histórico salvo.');
  }
}
carregarHistorico();
</script>

</body>
</html>
